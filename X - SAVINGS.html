<!DOCTYPE html>
<html lang="id">
<head>
    <meta carset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AchieveVault | Premium Savings & Certificate</title>
    <!-- html2canvas untuk sertifikat -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <!-- Font Awesome 6 (mewah) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Playfair Display + Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s ease, color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        /* ========== THEMES ========== */
        :root {
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #eef2f5;
            --card-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 215, 140, 0.3);
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --accent-gold: #c9a03d;
            --accent-gold-light: #eab308;
            --accent-blue: #1e4a6e;
            --accent-blue-light: #3b82f6;
            --border-light: #e2e8f0;
            --progress-bg: #e2e8f0;
            --btn-primary: #1e4a6e;
            --btn-primary-hover: #0f3a54;
            --danger: #b91c1c;
            --success: #2e7d64;
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
        }

        body.dark {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #111827;
            --card-bg: rgba(30, 41, 59, 0.95);
            --glass-border: rgba(234, 179, 8, 0.3);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent-gold: #eab308;
            --accent-blue: #38bdf8;
            --border-light: #334155;
            --progress-bg: #334155;
            --btn-primary: #eab308;
            --btn-primary-hover: #ca8a04;
            --danger: #ef4444;
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 24px 20px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* glassmorphism navbar */
        .navbar {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 80px;
            padding: 12px 28px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-blue-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo i { background: none; -webkit-background-clip: unset; color: var(--accent-gold); margin-right: 6px; }

        .controls-group {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: rgba(128, 128, 128, 0.1);
            border: 1px solid var(--border-light);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .icon-btn:hover {
            background: var(--accent-gold);
            color: #0f172a;
            border-color: var(--accent-gold);
        }

        /* card style */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            border: 1px solid var(--glass-border);
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .dashboard-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .profile-col {
            flex: 1.2;
            min-width: 280px;
        }
        .savings-col {
            flex: 2.5;
            min-width: 320px;
        }

        /* Avatar lingkaran mewah */
        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .avatar-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent-gold), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            border: 4px solid rgba(255,215,0,0.5);
            transition: transform 0.2s;
        }
        .avatar-circle:hover { transform: scale(1.02); }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-placeholder { font-size: 54px; color: white; text-shadow: 0 2px 6px rgba(0,0,0,0.2); }

        .info-row {
            margin: 18px 0;
            border-bottom: 1px dashed var(--border-light);
            padding-bottom: 12px;
        }
        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--accent-gold);
        }
        .info-value {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            font-weight: 600;
        }
        .edit-btn {
            background: none;
            border: none;
            color: var(--accent-blue-light);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .progress-section {
            margin: 25px 0;
        }
        .progress-bar-bg {
            background: var(--progress-bg);
            border-radius: 60px;
            height: 16px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-blue-light));
            width: 0%;
            height: 100%;
            border-radius: 60px;
        }

        .savings-list {
            max-height: 380px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 6px;
        }
        .saving-card {
            background: rgba(0,0,0,0.03);
            background: var(--bg-gradient-end);
            border-radius: 28px;
            padding: 14px 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid var(--border-light);
        }
        .saving-info strong { font-size: 1rem; }
        .badge-currency {
            background: var(--accent-gold);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #0f172a;
        }
        .flex-input {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        input, select {
            background: var(--bg-gradient-start);
            border: 1px solid var(--border-light);
            padding: 10px 16px;
            border-radius: 60px;
            color: var(--text-primary);
            outline: none;
        }
        button {
            background: var(--btn-primary);
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button.outline {
            background: transparent;
            border: 1px solid var(--btn-primary);
            color: var(--btn-primary);
        }
        button.small {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .certificate-paper {
            background: #fffef7;
            padding: 40px 30px;
            border-radius: 36px;
            max-width: 620px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 45px rgba(0,0,0,0.3);
            border: 8px double #d4af37;
            transition: 0.2s;
        }
        body.dark .certificate-paper {
            background: #2a2418;
            color: #ffefcf;
            border-color: #eab308;
        }
        .hidden { display: none; }
        .auth-box {
            max-width: 520px;
            margin: 30px auto;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            opacity: 0.7;
            font-size: 0.8rem;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--border-light); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="navbar">
        <div class="logo"><i class="fas fa-crown"></i> AchieveVault</div>
        <div class="controls-group">
            <select id="globalLang" class="icon-btn" style="background: transparent;"><option value="id">🇮🇩 Indonesia</option><option value="en">🇬🇧 English</option><option value="ja">🇯🇵 日本語</option><option value="fr">🇫🇷 Français</option></select>
            <button id="globalThemeBtn" class="icon-btn"><i class="fas fa-palette"></i> <span>Mode Mewah</span></button>
            <button id="globalLogoutBtn" class="icon-btn hidden" id="logoutBtnNav"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <!-- LOGIN / REGISTRATION PANEL -->
    <div id="authPanel" class="card auth-box">
        <h2 style="font-family: 'Playfair Display'; margin-bottom: 20px;"><i class="fas fa-gem"></i> <span id="authTitle">Akses Prestasi Tabungan</span></h2>
        <div>
            <input type="text" id="regName" placeholder="Nama Lengkap" style="width:100%; margin-bottom: 16px;">
            <input type="number" id="regNumber" placeholder="Nomor Unik (1 - 10 Miliar)" style="width:100%; margin-bottom: 16px;">
            <label style="font-size: 0.8rem;">Pilih Mata Uang Utama:</label>
            <select id="regCurrency" style="width:100%; margin: 10px 0 20px 0;">
                <!-- daftar lengkap mata uang dunia (simbol + kode) -->
                <option value="USD|$">🇺🇸 USD - Dollar ($)</option><option value="IDR|Rp">🇮🇩 IDR - Rupiah (Rp)</option><option value="EUR|€">🇪🇺 Euro (€)</option><option value="JPY|¥">🇯🇵 Yen (¥)</option><option value="GBP|£">🇬🇧 Pound (£)</option><option value="AUD|A$">🇦🇺 Australian Dollar (A$)</option><option value="CAD|C$">🇨🇦 Canadian Dollar (C$)</option><option value="CHF|CHF">🇨🇭 Swiss Franc (CHF)</option><option value="CNY|¥">🇨🇳 Yuan (¥)</option><option value="INR|₹">🇮🇳 Rupee (₹)</option><option value="SGD|S$">🇸🇬 Dollar Singapura (S$)</option><option value="KRW|₩">🇰🇷 Won (₩)</option><option value="MYR|RM">🇲🇾 Ringgit (RM)</option><option value="THB|฿">🇹🇭 Baht (฿)</option><option value="BRL|R$">🇧🇷 Real (R$)</option><option value="ZAR|R">🇿🇦 Rand (R)</option><option value="NZD|NZ$">🇳🇿 NZ Dollar (NZ$)</option>
            </select>
            <button id="authSubmitBtn" style="width:100%;"><i class="fas fa-unlock-alt"></i> Mulai / Login</button>
            <p id="authMsg" style="margin-top: 16px; font-size: 13px; color: var(--danger);"></p>
        </div>
    </div>

    <!-- DASHBOARD UTAMA (setelah login) -->
    <div id="dashboardPanel" class="hidden">
        <div class="dashboard-grid">
            <!-- Sisi Profil -->
            <div class="profile-col card">
                <div class="avatar-wrapper">
                    <div class="avatar-circle" id="avatarTrigger">
                        <img id="profileAvatarImg" src="" alt="avatar" style="display: none;">
                        <span id="avatarPlaceholderIcon" class="avatar-placeholder"><i class="fas fa-user-astronaut"></i></span>
                    </div>
                    <input type="file" id="avatarFileInput" accept="image/*" style="display: none;">
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-user"></i> Nama</div>
                    <div class="info-value"><span id="profiName">-</span><button class="edit-btn" id="editNameGlobal"><i class="fas fa-pen"></i></button></div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-qrcode"></i> ID Unik</div>
                    <div class="info-value"><span id="profiNumber">-</span></div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-coins"></i> Mata Uang</div>
                    <div class="info-value"><span id="profiCurrencySym">Rp</span><button class="edit-btn" id="editCurrencyGlobal"><i class="fas fa-exchange-alt"></i></button></div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-chart-line"></i> Target Tabungan</div>
                    <div class="info-value"><span id="profiTarget">0</span><button class="edit-btn" id="editTargetGlobal"><i class="fas fa-edit"></i></button></div>
                </div>
                <div class="progress-section">
                    <div class="progress-bar-bg"><div class="progress-fill" id="globalProgressFill"></div></div>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px;"><span id="totalSavedAmount">0</span><span id="targetAmountText">0</span></div>
                </div>
            </div>

            <!-- Sisi Tabungan -->
            <div class="savings-col card">
                <h3 style="font-family: 'Playfair Display';"><i class="fas fa-piggy-bank"></i> <span id="savingsTitle">Portofolio Tabungan</span></h3>
                <div id="savingsListContainer" class="savings-list"></div>
                <div style="display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;">
                    <select id="newItemType"><option value="E-wallet">📱 E-wallet</option><option value="Bank">🏦 Bank</option><option value="Celengan">🐷 Celengan</option></select>
                    <input type="text" id="newItemName" placeholder="Nama (Dana/BCA/Gopay)" style="flex:1;">
                    <input type="number" id="newItemBalance" placeholder="Saldo" value="0" style="width:120px;">
                    <button id="addSavingItemBtn"><i class="fas fa-plus-circle"></i> Tambah</button>
                </div>
                <button id="refreshTotalBtn" class="outline" style="width: 100%;"><i class="fas fa-sync-alt"></i> Hitung Ulang Total</button>
            </div>
        </div>
    </div>
    <footer>✨ Setiap Rupiah & Dollar berhak mendapat mahkota ✨</footer>
</div>

<script>
    // --------------------- GLOBAL STATE ---------------------
    let currentUser = null;       // object user data
    let currentLang = "id";
    let certificateShownForSession = false;  // per user session, hindari double modal

    // Translations (mewah & lengkap)
    const dict = {
        id: { authTitle: "Akses Prestasi Tabungan", nameLabel: "Nama", targetLabel: "Target Tabungan", savingsTitle: "Portofolio Tabungan", totalSaved: "Total Terkumpul", certificateTitle: "SERTIFIKAT APRESIASI", certText: "Sertifikat ini diberikan kepada Anda yang telah berhasil menyimpan dana sebesar", certFooter: "TABUNGAN BERHARGA", resetDone: "✨ Akun telah di-reset. Selamat! Silakan login lagi." },
        en: { authTitle: "Access Savings Glory", nameLabel: "Name", targetLabel: "Target Savings", savingsTitle: "Savings Portfolio", totalSaved: "Total Collected", certificateTitle: "CERTIFICATE OF APPRECIATION", certText: "This certificate is awarded to those who have successfully saved the amount of", certFooter: "SAVINGS A WORTH", resetDone: "✨ Account reset. Congratulations! Please login again." },
        ja: { authTitle: "貯蓄への栄冠", nameLabel: "名前", targetLabel: "貯蓄目標", savingsTitle: "貯蓄ポートフォリオ", totalSaved: "総額", certificateTitle: "感謝状", certText: "この証明書は、将来のために貯蓄額", certFooter: "貯蓄の価値", resetDone: "✨ アカウントをリセットしました。再度ログインしてください。" },
        fr: { authTitle: "Accès aux économies", nameLabel: "Nom", targetLabel: "Objectif épargne", savingsTitle: "Portefeuille d'épargne", totalSaved: "Total collecté", certificateTitle: "CERTIFICAT DE RECONNAISSANCE", certText: "Ce certificat est décerné pour avoir économisé avec succès le montant de", certFooter: "L'ÉPARGNE A DE LA VALEUR", resetDone: "✨ Compte réinitialisé. Veuillez vous reconnecter." }
    };

    function t(key) { return dict[currentLang]?.[key] || dict.id[key] || key; }
    function applyUITexts() {
        if(document.getElementById("authTitle")) document.getElementById("authTitle").innerText = t("authTitle");
        if(document.getElementById("savingsTitle")) document.getElementById("savingsTitle").innerText = t("savingsTitle");
        // update dinamis lainnya
    }

    // ---------- Helper LocalStorage ----------
    function getUserKey(number) { return `vault_user_${number}`; }
    function saveUserToLocal(user) { if(user && user.number) localStorage.setItem(getUserKey(user.number), JSON.stringify(user)); }
    function loadUserFromLocal(number) { let raw = localStorage.getItem(getUserKey(number)); return raw ? JSON.parse(raw) : null; }
    function deleteUserFromLocal(number) { localStorage.removeItem(getUserKey(number)); }

    // default savings items (E-wallet, bank, celengan)
    function getDefaultSavingsItems() {
        return [
            { id: Date.now()+101, type: "E-wallet", name: "Dana", balance: 0 },
            { id: Date.now()+102, type: "E-wallet", name: "OVO", balance: 0 },
            { id: Date.now()+103, type: "E-wallet", name: "GoPay", balance: 0 },
            { id: Date.now()+104, type: "Bank", name: "BCA", balance: 0 },
            { id: Date.now()+105, type: "Celengan", name: "Celengan Emas", balance: 0 }
        ];
    }

    function createNewUser(name, number, currencyRaw) {
        let [code, sym] = currencyRaw.split("|");
        return {
            name: name.trim(),
            number: number,
            currencyCode: code,
            currencySymbol: sym,
            targetAmount: 1000000,
            savingsItems: getDefaultSavingsItems(),
            profilePicture: null,
            achievedFlag: false
        };
    }

    // hitung total tabungan
    function computeTotalSavings(user) {
        return user.savingsItems.reduce((sum, item) => sum + (Number(item.balance) || 0), 0);
    }

    // render UI dashboard
    function renderDashboard() {
        if (!currentUser) return;
        let u = currentUser;
        document.getElementById("profiName").innerText = u.name;
        document.getElementById("profiNumber").innerText = u.number;
        document.getElementById("profiCurrencySym").innerText = u.currencySymbol;
        document.getElementById("profiTarget").innerText = u.targetAmount.toLocaleString() + " " + u.currencySymbol;
        let total = computeTotalSavings(u);
        document.getElementById("totalSavedAmount").innerHTML = `<i class="fas fa-coins"></i> ${total.toLocaleString()} ${u.currencySymbol}`;
        document.getElementById("targetAmountText").innerHTML = `<i class="fas fa-bullseye"></i> ${u.targetAmount.toLocaleString()} ${u.currencySymbol}`;
        let percent = (total / u.targetAmount) * 100;
        if (percent > 100) percent = 100;
        document.getElementById("globalProgressFill").style.width = percent + "%";

        // Avatar
        if (u.profilePicture) {
            document.getElementById("profileAvatarImg").src = u.profilePicture;
            document.getElementById("profileAvatarImg").style.display = "block";
            document.getElementById("avatarPlaceholderIcon").style.display = "none";
        } else {
            document.getElementById("profileAvatarImg").style.display = "none";
            document.getElementById("avatarPlaceholderIcon").style.display = "flex";
        }

        // Render savings list
        let container = document.getElementById("savingsListContainer");
        container.innerHTML = "";
        u.savingsItems.forEach(item => {
            const div = document.createElement("div");
            div.className = "saving-card";
            div.innerHTML = `
                <div><strong>${item.type}</strong> · ${item.name}<br><span class="badge-currency">${u.currencySymbol} ${Number(item.balance).toLocaleString()}</span></div>
                <div class="flex-input">
                    <input type="number" id="bal_${item.id}" value="${item.balance}" style="width:110px;" placeholder="saldo">
                    <button class="small updateSaldoBtn" data-id="${item.id}"><i class="fas fa-save"></i></button>
                    <button class="small deleteSavBtn" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
            container.appendChild(div);
        });
        // Attach dynamic events
        document.querySelectorAll(".updateSaldoBtn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let id = parseInt(btn.getAttribute("data-id"));
                let inputVal = document.getElementById(`bal_${id}`).value;
                let newBalance = parseFloat(inputVal);
                if (!isNaN(newBalance)) {
                    let targetItem = currentUser.savingsItems.find(i => i.id === id);
                    if (targetItem) targetItem.balance = newBalance;
                    saveUserToLocal(currentUser);
                    renderDashboard();
                    checkAchievementAndCertificate();
                }
            });
        });
        document.querySelectorAll(".deleteSavBtn").forEach(btn => {
            btn.addEventListener("click", () => {
                let id = parseInt(btn.getAttribute("data-id"));
                currentUser.savingsItems = currentUser.savingsItems.filter(i => i.id !== id);
                saveUserToLocal(currentUser);
                renderDashboard();
                checkAchievementAndCertificate();
            });
        });
    }

    // Pencapaian target & modal sertifikat (tanpa bug double)
    function checkAchievementAndCertificate() {
        if (!currentUser) return;
        let total = computeTotalSavings(currentUser);
        if (total >= currentUser.targetAmount && !certificateShownForSession) {
            certificateShownForSession = true;
            showCertificateModal(currentUser);
        }
    }

    // Sertifikat mewah (download, print, share, reset)
    async function showCertificateModal(user) {
        // Hapus modal jika sudah ada
        let existModal = document.querySelector(".modal");
        if(existModal) existModal.remove();
        const modalDiv = document.createElement("div");
        modalDiv.className = "modal";
        const isDark = document.body.classList.contains("dark");
        const targetFormatted = user.targetAmount.toLocaleString() + " " + user.currencySymbol;
        modalDiv.innerHTML = `
            <div class="certificate-paper" id="certificateContainer">
                <i class="fas fa-award" style="font-size: 48px; color: #d4af37;"></i>
                <h1 style="font-family: 'Playfair Display'; margin: 15px 0;">🏆 ${t("certificateTitle")} 🏆</h1>
                <p style="margin: 20px 0;">${t("certText")}</p>
                <h2 style="font-size: 2.2rem; font-weight: bold; border-bottom: 2px solid gold; display: inline-block; padding-bottom: 8px;">${user.name}</h2>
                <p style="font-size: 1.8rem; font-weight: 700; margin: 20px 0; background: linear-gradient(135deg, #c9a03d, #eab308); -webkit-background-clip: text; background-clip: text; color: transparent;">${targetFormatted}</p>
                <p><i>${t("certFooter")}</i></p>
                <div style="margin-top: 35px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <button id="certDownloadBtn"><i class="fas fa-download"></i> Download PNG</button>
                    <button id="certPrintBtn"><i class="fas fa-print"></i> Cetak</button>
                    <button id="certShareBtn"><i class="fas fa-share-alt"></i> Share</button>
                    <button id="certResetBtn" style="background: #b45309;"><i class="fas fa-trash-restore"></i> Selesai & Reset Akun</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const certElem = document.getElementById("certificateContainer");
        // Download
        document.getElementById("certDownloadBtn").onclick = () => {
            html2canvas(certElem, { scale: 2, backgroundColor: isDark ? "#2a2418" : "#fffef7" }).then(canvas => {
                let link = document.createElement('a');
                link.download = `certificate_${user.name}.png`;
                link.href = canvas.toDataURL();
                link.click();
            }).catch(()=>alert("generate ulang"));
        };
        document.getElementById("certPrintBtn").onclick = () => {
            let printWindow = window.open('', '_blank');
            printWindow.document.write(`<html><head><title>Certificate</title><style>body{text-align:center; font-family:serif;}</style></head><body>${certElem.outerHTML}</body></html>`);
            printWindow.print();
        };
        document.getElementById("certShareBtn").onclick = async () => {
            let canvas = await html2canvas(certElem);
            canvas.toBlob(blob => {
                if (navigator.share) navigator.share({ title: 'Savings Certificate', files: [new File([blob], 'cert.png', { type: 'image/png' })] }).catch(()=>alert("Share via download"));
                else alert("Gunakan tombol download untuk menyimpan sertifikat");
            });
        };
        // Reset total data user setelah sertifikat
        document.getElementById("certResetBtn").onclick = () => {
            if (currentUser && currentUser.number) {
                deleteUserFromLocal(currentUser.number);
            }
            currentUser = null;
            certificateShownForSession = false;
            modalDiv.remove();
            showAuthScreen();
            alert(t("resetDone"));
        };
    }

    function showAuthScreen() {
        document.getElementById("authPanel").classList.remove("hidden");
        document.getElementById("dashboardPanel").classList.add("hidden");
        document.getElementById("globalLogoutBtn").classList.add("hidden");
        currentUser = null;
        certificateShownForSession = false;
    }

    function loadDashboard(user) {
        currentUser = user;
        certificateShownForSession = false; // reset flag setiap login
        document.getElementById("authPanel").classList.add("hidden");
        document.getElementById("dashboardPanel").classList.remove("hidden");
        document.getElementById("globalLogoutBtn").classList.remove("hidden");
        renderDashboard();
        // cek langsung jika sudah tercapai sebelum (tapi tidak double)
        let total = computeTotalSavings(currentUser);
        if (total >= currentUser.targetAmount) certificateShownForSession = false;
        checkAchievementAndCertificate();
    }

    // LOGIC AUTH / REGISTER
    document.getElementById("authSubmitBtn").onclick = () => {
        let name = document.getElementById("regName").value.trim();
        let numberRaw = document.getElementById("regNumber").value.trim();
        let currencyVal = document.getElementById("regCurrency").value;
        if (!name || !numberRaw) { document.getElementById("authMsg").innerText = "Isi nama dan nomor unik!"; return; }
        let number = Number(numberRaw);
        if (number < 1 || number > 10000000000 || isNaN(number)) { document.getElementById("authMsg").innerText = "Nomor harus antara 1 - 10 Miliar"; return; }
        let existingUser = loadUserFromLocal(number);
        if (existingUser) {
            // Login dengan user yang sudah ada
            loadDashboard(existingUser);
        } else {
            let newUser = createNewUser(name, number, currencyVal);
            saveUserToLocal(newUser);
            loadDashboard(newUser);
        }
    };

    // Edit profile components
    document.getElementById("editNameGlobal")?.addEventListener("click", () => {
        let newName = prompt("Nama baru:", currentUser.name);
        if (newName && newName.trim()) { currentUser.name = newName.trim(); saveUserToLocal(currentUser); renderDashboard(); }
    });
    document.getElementById("editCurrencyGlobal")?.addEventListener("click", () => {
        let newCode = prompt("Kode mata uang (contoh: USD, EUR, JPY):", currentUser.currencyCode);
        if (newCode) {
            let sym = "$";
            const symbolMap = { USD:"$", IDR:"Rp", EUR:"€", JPY:"¥", GBP:"£", AUD:"A$", CAD:"C$", CHF:"CHF", CNY:"¥", INR:"₹", SGD:"S$", KRW:"₩", MYR:"RM", THB:"฿" };
            sym = symbolMap[newCode.toUpperCase()] || newCode;
            currentUser.currencyCode = newCode.toUpperCase();
            currentUser.currencySymbol = sym;
            saveUserToLocal(currentUser); renderDashboard();
        }
    });
    document.getElementById("editTargetGlobal")?.addEventListener("click", () => {
        let newTarget = parseFloat(prompt("Target tabungan baru (angka):", currentUser.targetAmount));
        if (!isNaN(newTarget) && newTarget >= 0) { currentUser.targetAmount = newTarget; saveUserToLocal(currentUser); renderDashboard(); checkAchievementAndCertificate(); }
    });
    document.getElementById("addSavingItemBtn")?.addEventListener("click", () => {
        let type = document.getElementById("newItemType").value;
        let name = document.getElementById("newItemName").value.trim();
        let balance = parseFloat(document.getElementById("newItemBalance").value);
        if (!name) name = `${type} baru`;
        if (isNaN(balance)) balance = 0;
        let newId = Date.now();
        currentUser.savingsItems.push({ id: newId, type, name, balance });
        saveUserToLocal(currentUser);
        renderDashboard();
        document.getElementById("newItemName").value = "";
        document.getElementById("newItemBalance").value = "0";
    });
    document.getElementById("refreshTotalBtn")?.addEventListener("click", () => { renderDashboard(); checkAchievementAndCertificate(); });
    document.getElementById("globalLogoutBtn")?.addEventListener("click", () => { showAuthScreen(); });

    // Avatar upload
    document.getElementById("avatarTrigger")?.addEventListener("click", () => { document.getElementById("avatarFileInput").click(); });
    document.getElementById("avatarFileInput")?.addEventListener("change", (e) => {
        if (e.target.files && e.target.files[0]) {
            let reader = new FileReader();
            reader.onload = (ev) => { currentUser.profilePicture = ev.target.result; saveUserToLocal(currentUser); renderDashboard(); };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    // Theme Toggle (Dark/Light mewah)
    document.getElementById("globalThemeBtn")?.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        let isDark = document.body.classList.contains("dark");
        localStorage.setItem("vaultTheme", isDark ? "dark" : "light");
        // jika ada modal sertifikat terbuka, update style sederhana
        let certDiv = document.querySelector(".certificate-paper");
        if(certDiv) certDiv.style.background = isDark ? "#2a2418" : "#fffef7";
    });
    // Language
    document.getElementById("globalLang")?.addEventListener("change", (e) => { currentLang = e.target.value; applyUITexts(); renderDashboard(); });
    // Load theme
    if (localStorage.getItem("vaultTheme") === "dark") document.body.classList.add("dark");
    applyUITexts();
    if (localStorage.length) showAuthScreen();
    else showAuthScreen();
</script>
</body>
</html>
